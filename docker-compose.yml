services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8000"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    ports:
      - "3002:3000"
    depends_on:
      - backend
